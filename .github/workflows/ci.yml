name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cargo-features: ""
          - os: macos-latest
            cargo-features: --features accelerate
          - os: windows-latest
            cargo-features: ""
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Rust tests
        run: cargo test -p canora ${{ matrix.cargo-features }}

      - name: Build Python bindings
        if: matrix.os != 'windows-latest'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin numpy
          maturin develop --release -m canora-python/Cargo.toml

      - name: Python tests
        if: matrix.os != 'windows-latest'
        run: |
          source .venv/bin/activate
          python tests/python/test_api.py
